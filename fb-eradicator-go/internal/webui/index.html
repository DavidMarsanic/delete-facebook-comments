<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fberadicator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧹</text></svg>">
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2e38;
    --text: #e6e8ec;
    --muted: #9aa1ac;
    --accent: #4f8cff;
    --danger: #e05252;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --border: #dde1e8;
      --text: #1a1d23;
      --muted: #5a6070;
      --accent: #2f6fed;
      --danger: #c53030;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    padding: 1rem;
  }
  main { width: 100%; max-width: 520px; }
  h1 { font-size: 1.1rem; margin: 0 0 .6rem; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .85rem;
    margin-bottom: .6rem;
  }
  label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .25rem; }
  select, input[type=number] {
    width: 100%;
    padding: .5rem .6rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: .95rem;
  }
  .row { display: flex; gap: .75rem; margin-bottom: .6rem; }
  .row > div { flex: 1; }
  .row:last-child { margin-bottom: 0; }
  .checkbox-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .6rem; }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; color: var(--text); font-size: .9rem; }
  button {
    width: 100%;
    padding: .7rem;
    border-radius: 6px;
    border: none;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: white;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.danger { background: var(--danger); }
  .safety {
    font-size: .75rem;
    color: var(--muted);
    margin: .6rem 0 0;
    line-height: 1.35;
  }
  pre#log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .6rem;
    height: 300px;
    overflow-y: auto;
    font-size: .78rem;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
  }
  .status { font-size: .8rem; color: var(--muted); margin-bottom: .4rem; }
</style>
</head>
<body>
<main>
  <h1>fberadicator</h1>

  <div class="panel">
    <div class="row">
      <div>
        <label for="mode">What to clear</label>
        <select id="mode"></select>
      </div>
      <div>
        <label for="limit">Batch limit (0 = unlimited)</label>
        <input type="number" id="limit" min="0" value="0">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="dateFrom">Only on/after (optional)</label>
        <input type="date" id="dateFrom">
      </div>
      <div>
        <label for="dateTo">Only on/before (optional)</label>
        <input type="date" id="dateTo">
      </div>
    </div>

    <div class="row">
      <div><button id="startBtn">Start</button></div>
      <div><button id="stopBtn" class="danger" disabled>Stop</button></div>
    </div>
    <p class="safety">
      Your own account only. If Chrome asks for a login or a CAPTCHA, handle
      it there — this page keeps waiting automatically.
    </p>
  </div>

  <div class="panel">
    <div class="status" id="status">Idle.</div>
    <pre id="log"></pre>
  </div>
</main>

<script>
const modeSelect = document.getElementById('mode');
const limitInput = document.getElementById('limit');
const dateFromInput = document.getElementById('dateFrom');
const dateToInput = document.getElementById('dateTo');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');

// playAlertSound is a self-contained beep (no audio file to ship) for
// moments that need a human — e.g. Facebook re-asking for your password
// mid-run. Browsers require some prior user gesture on the page before
// audio is allowed to play; clicking Start already satisfies that for the
// rest of the run.
function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.6);
  } catch (e) {
    // Audio isn't essential to the tool working — never let it break the run.
  }
}

function appendLine(text) {
  const clean = text.replace(/^/, '');
  if (clean.includes('[ATTENTION]')) {
    playAlertSound();
    statusEl.textContent = 'Needs your attention — check the Chrome window.';
  }
  logEl.textContent += (logEl.textContent ? '\n' : '') + clean;
  logEl.scrollTop = logEl.scrollHeight;
}

async function loadModes() {
  const res = await fetch('/api/modes');
  const modes = await res.json();
  modeSelect.innerHTML = '';
  for (const m of modes) {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = m.id + ' (' + m.verb + ')';
    modeSelect.appendChild(opt);
  }
  if (modes.some(m => m.id === 'comments')) {
    modeSelect.value = 'comments';
  }
}

function streamLog() {
  const es = new EventSource('/api/stream');
  es.onmessage = (e) => appendLine(e.data);
  es.addEventListener('done', () => {
    es.close();
    statusEl.textContent = 'Done.';
    startBtn.disabled = false;
    stopBtn.disabled = true;
  });
  es.onerror = () => {
    es.close();
    startBtn.disabled = false;
    stopBtn.disabled = true;
  };
}

startBtn.addEventListener('click', async () => {
  logEl.textContent = '';
  statusEl.textContent = 'Running…';
  startBtn.disabled = true;
  stopBtn.disabled = false;

  const body = {
    mode: modeSelect.value,
    limit: parseInt(limitInput.value, 10) || 0,
    dateFrom: dateFromInput.value,
    dateTo: dateToInput.value,
  };

  const res = await fetch('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const text = await res.text();
    appendLine('Error: ' + text);
    statusEl.textContent = 'Failed to start.';
    startBtn.disabled = false;
    stopBtn.disabled = true;
    return;
  }

  streamLog();
});

stopBtn.addEventListener('click', async () => {
  stopBtn.disabled = true;
  statusEl.textContent = 'Stopping…';
  await fetch('/api/stop', { method: 'POST' });
});

loadModes();
</script>
</body>
</html>
